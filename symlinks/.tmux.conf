# Remap prefix from C-b to F1
unbind C-b
set-option -g prefix F1
bind-key F1 send-prefix

# Split panes using % and -
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'

# Auto resize horizontally and vertically
bind + select-layout tiled

# Configure color for terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Count from 1 instead of 0, and renumber on close
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1
setw -g automatic-rename on

# Increase history limit
set -g history-limit 10000

# Activate mouse use
set -g mouse on

# Disable delay between escape key and subsequent sequence
set -sg escape-time 0

# Display activity (no visual style change to avoid the black background)
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style 'none'

# Turn on vim binding in copy mode
set-option -g status-keys vi
set-window-option -g mode-keys vi

# Switch panes using vim style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use a to toggle synchronize panes
bind a set-window-option synchronize-panes

# Copy mode option
bind / copy-mode

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 80

# Active window — bold, colored background, clearly distinct
set -g window-status-current-format '#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W '
# Inactive window — muted
set -g window-status-format '#[fg=#6c7086] #I:#W '
# Separator between windows
set -g window-status-separator ''

# Pane borders
set -g pane-active-border-style 'fg=#a6e3a1'
set -g pane-border-style 'fg=#40a02b'

# Message / command prompt
set -g message-style 'bg=#313244 fg=#cdd6f4'

# Left: session name
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] '

# Right: system stats + clock
set -g status-right '#[fg=#a6e3a1]#(~/.tmux-stats.sh)#[default] #[fg=#89b4fa]%H:%M#[default] #[fg=#cba6f7]%d-%b#[default]'

# Import macOS-only config
if-shell 'test "$(uname -s)" = Darwin' 'source-file ${HOME}/.tmux-osx.conf'
